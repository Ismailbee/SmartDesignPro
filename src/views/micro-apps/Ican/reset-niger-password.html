<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Niger State Branch Password</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .loading {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    .code-box {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      font-family: 'Courier New', monospace;
      border-left: 4px solid #667eea;
    }
    .warning {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #ffc107;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Reset Niger State Password</h1>
    <p class="subtitle">Reset the Niger State branch password to default</p>
    
    <div class="warning">
      <strong>⚠️ Important:</strong> This will reset the Niger State branch password to the default password: <code>niger123</code>
    </div>

    <div class="code-box">
      <strong>Default Password:</strong> niger123
    </div>

    <button id="resetBtn" onclick="resetPassword()">
      Reset Niger State Password to "niger123"
    </button>

    <div id="status"></div>
  </div>

  <script type="module">
    import { ICANBranchService } from './src/services/ican-service.js';

    window.resetPassword = async function() {
      const btn = document.getElementById('resetBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      status.style.display = 'block';
      status.className = 'loading';
      status.textContent = '🔄 Resetting password to "niger123"...';

      try {
        await ICANBranchService.resetBranchToDefaultPassword('Niger State');
        
        status.className = 'success';
        status.innerHTML = `
          ✅ <strong>Success!</strong><br>
          Niger State branch password has been reset to: <strong>niger123</strong><br><br>
          You can now login with:<br>
          - Branch: <strong>Niger State</strong><br>
          - Password: <strong>niger123</strong>
        `;
        
      } catch (error) {
        status.className = 'error';
        status.innerHTML = `
          ❌ <strong>Error:</strong> ${error.message}<br><br>
          Please check:<br>
          • Internet connection is active<br>
          • Firebase is properly configured<br>
          • Niger State branch exists in Firebase
        `;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
